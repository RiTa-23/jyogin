name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: Jyogin-macOS
            separator: ':'
          - os: windows-latest
            artifact: Jyogin-Windows
            separator: ';'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pip install --upgrade pip
          pip install \
            "pywebview==4.4.1" \
            "nfcpy==1.0.4" \
            "jaconv==0.4.0" \
            "pyinstaller==6.16.0"

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install --upgrade pip
          pip install \
            "pywebview==4.4.1" \
            "pythonnet==3.0.5" \
            "nfcpy==1.0.4" \
            "jaconv==0.4.0" \
            "pyinstaller==6.16.0"

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "icon=frontend/public/JyogiN.icns" >> "$GITHUB_OUTPUT"
          else
            echo "icon=frontend/public/JyogiN.ico" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug pythonnet location (Windows)
        if: runner.os == 'Windows'
        run: python -c "import pythonnet; print(pythonnet.__file__); import os; d=os.path.dirname(pythonnet.__file__); print(os.listdir(d)); r=os.path.join(d,'runtime'); print(os.listdir(r) if os.path.isdir(r) else 'no runtime dir')"

      - name: Debug pythonnet versions (Windows)
        if: runner.os == 'Windows'
        run: python -c "import importlib.metadata as m; print('pythonnet', m.version('pythonnet')); print('clr-loader', m.version('clr-loader'))"

      - name: Build app
        env:
          APP_VERSION: ${{ steps.vars.outputs.version }}
          APP_ICON: ${{ steps.vars.outputs.icon }}
        run: pyinstaller --clean -y Jyogin.spec

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Jyogin" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Jyogin.app" 150 200 \
            --app-drop-link 450 200 \
            "Jyogin-macOS.dmg" \
            "dist/Jyogin.app"

      - name: Zip app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Jyogin -DestinationPath Jyogin-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.dmg
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Jyogin-macOS.dmg
            artifacts/Jyogin-Windows.zip
          generate_release_notes: true
