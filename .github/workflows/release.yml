name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: JyogiN-macOS
            separator: ':'
          - os: windows-latest
            artifact: JyogiN-Windows
            separator: ';'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pywebview nfcpy jaconv pyinstaller

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Build app
        run: >
          pyinstaller -y --windowed --name "JyogiN"
          --add-data "frontend/dist${{ matrix.separator }}frontend/dist"
          --collect-submodules nfc
          backend/main.py

      - name: Zip app (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../JyogiN-macOS.zip JyogiN.app

      - name: Zip app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/JyogiN -DestinationPath JyogiN-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: '*.zip'

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
