name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: JyogiN-macOS
            separator: ':'
          - os: windows-latest
            artifact: JyogiN-Windows
            separator: ';'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pywebview nfcpy jaconv pyinstaller

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Set icon path
        id: icon
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "path=frontend/public/JyogiN.icns" >> "$GITHUB_OUTPUT"
          else
            echo "path=frontend/public/JyogiN.ico" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app
        run: >
          pyinstaller -y --windowed --name "JyogiN"
          --icon "${{ steps.icon.outputs.path }}"
          --add-data "frontend/dist${{ matrix.separator }}frontend/dist"
          --collect-submodules nfc
          backend/main.py

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "JyogiN" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "JyogiN.app" 150 200 \
            --app-drop-link 450 200 \
            "JyogiN-macOS.dmg" \
            "dist/JyogiN.app"

      - name: Zip app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/JyogiN -DestinationPath JyogiN-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.dmg
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
          generate_release_notes: true
